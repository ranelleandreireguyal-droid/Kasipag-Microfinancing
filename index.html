<!DOCTYPE html>
<html>
<head>
  <title>Home - Kasipag Microfinancing</title>

  <!-- IMPORTANT: para responsive sa phone -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      max-width: 500px;
      margin: auto;
    }

    h2 {
      text-align: center;
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      font-size: 16px;
    }

    button {
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      margin-top: 10px;
    }

    .login-links {
      text-align: center;
      margin-top: 20px;
    }

    .login-links a {
      display: block;
      margin: 10px 0;
      padding: 10px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h2>Welcome to Kasipag Microfinancing</h2>

<h3>Sign Up</h3>
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<select id="role">
  <option value="">Select Role</option>
  <option value="admin">Admin</option>
  <option value="cashier">Cashier</option>
  <option value="rider">Rider</option>
</select>
<button onclick="signUp()">Sign Up</button>

<div id="message"></div>

<div class="login-links">
  <h3>Login as:</h3>
  <a href="admin-login.html">Admin Login</a>
  <a href="cashier-login.html">Cashier Login</a>
  <a href="rider-login.html">Rider Login</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script>
// 🔥 ILAGAY FIREBASE CONFIG MO
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

function signUp() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  let role = document.getElementById("role").value;

  if (!email || !password || !role) {
    document.getElementById("message").innerHTML = "Please fill all fields.";
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .then((userCredential) => {
      // Signed up
      let user = userCredential.user;
      // Store role in Firestore
      db.collection("users").doc(user.uid).set({
        email: email,
        role: role
      });
      document.getElementById("message").innerHTML = "Sign up successful!";
    })
    .catch((error) => {
      document.getElementById("message").innerHTML = error.message;
    });
}
</script>

</body>
</html>
