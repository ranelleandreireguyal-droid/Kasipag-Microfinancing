<!DOCTYPE html>
<html>
<head>
  <title>Supabase Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Login System</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<p id="status"></p>

<script>
  // 🔑 Supabase Config (AYOS NA TO)
  const supabaseUrl = "https://varktzwttvxijmdcmjzn.supabase.co";

  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhcmt0end0dHZ4aWptZGNtanpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTA5NjUsImV4cCI6MjA5MTgyNjk2NX0.sRaIgfFj7Phz7y411mgDxr3BtuY7NaooY6apq6Teck0";

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  // 🔥 SIGN UP
  async function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabase.auth.signUp({
      email,
      password
    });

    document.getElementById("status").innerText =
      error ? error.message : "Signup successful! Check your email.";
  }

  // 🔥 LOGIN
  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    document.getElementById("status").innerText =
      error ? error.message : "Login successful! Welcome " + data.user.email;
  }

  // 🔥 LOGOUT
  async function logout() {
    await supabase.auth.signOut();
    document.getElementById("status").innerText = "Logged out!";
  }

</script>

</body>
</html>
