<!DOCTYPE html>
<html>
<head>
  <title>Firebase Login System</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

</head>
<body>

<h2>Login / Signup</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<p id="status"></p>

<script>
  // 🔥 FIREBASE CONFIG (ginamit mo)
  const firebaseConfig = {
    apiKey: "AIzaSyCfqkYXlDy-73t6SKxXb59L6OofEpG5B84",
    authDomain: "capstone-db-e181b.firebaseapp.com",
    projectId: "capstone-db-e181b",
    storageBucket: "capstone-db-e181b.firebasestorage.app",
    messagingSenderId: "104812686425",
    appId: "1:104812686425:web:88c3546b45c7237fc59548",
    measurementId: "G-H9FB26H7TS"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();

  // 🔐 SIGN UP
  function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
      .then(() => {
        document.getElementById("status").innerText = "Signup successful!";
      })
      .catch(error => {
        document.getElementById("status").innerText = error.message;
      });
  }

  // 🔑 LOGIN
  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then((userCredential) => {
        document.getElementById("status").innerText =
          "Login successful: " + userCredential.user.email;

        // redirect optional
        // window.location.href = "dashboard.html";
      })
      .catch(error => {
        document.getElementById("status").innerText = error.message;
      });
  }

  // 🚪 LOGOUT
  function logout() {
    auth.signOut();
    document.getElementById("status").innerText = "Logged out!";
  }

  // 👀 check user status
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById("status").innerText =
        "Logged in as: " + user.email;
    }
  });

</script>

</body>
</html>
