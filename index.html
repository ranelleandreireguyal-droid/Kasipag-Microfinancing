<!DOCTYPE html>
<html>
<head>
  <title>Payment System</title>

  <!-- IMPORTANT: para responsive sa phone -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 15px;
      max-width: 500px;
      margin: auto;
    }

    h2 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      font-size: 16px;
    }

    button {
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
    }

    #output {
      margin-top: 15px;
      background: #f1f1f1;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h2>Payment System</h2>

<input id="name" placeholder="Client Name">
<input id="amount" placeholder="Amount">
<button onclick="addData()">Save</button>

<h2>Search</h2>
<input id="search" onkeyup="loadData()" placeholder="Search name">

<div id="output"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script>
// 🔥 ILAGAY FIREBASE CONFIG MO
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function addData() {
  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;

  db.collection("payments").add({
    name: name,
    amount: amount
  });

  alert("Saved!");
}

function loadData() {
  let search = document.getElementById("search").value.toLowerCase();
  let text = "";

  db.collection("payments").get().then((data) => {
    data.forEach((doc) => {
      let d = doc.data();

      if (d.name.toLowerCase().includes(search)) {
        text += d.name + " - " + d.amount + "<br>";
      }
    });

    document.getElementById("output").innerHTML = text;
  });
}

loadData();
</script>

</body>
</html>
