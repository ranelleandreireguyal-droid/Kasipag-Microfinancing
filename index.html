<!DOCTYPE html>
<html>
<head>
  <title>Simple Payment System</title>
</head>
<body>

<h2>Add Payment</h2>

<input id="name" placeholder="Name"><br><br>
<input id="amount" placeholder="Amount"><br><br>
<button onclick="addData()">Save</button>

<h2>Search</h2>
<input id="search" onkeyup="loadData()" placeholder="Search name">

<div id="output"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script>
// ILAGAY MO FIREBASE CONFIG MO DITO
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function addData() {
  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;

  db.collection("payments").add({
    name: name,
    amount: amount
  });

  alert("Saved!");
}

function loadData() {
  let search = document.getElementById("search").value.toLowerCase();
  let text = "";

  db.collection("payments").get().then((data) => {
    data.forEach((doc) => {
      let d = doc.data();

      if (d.name.toLowerCase().includes(search)) {
        text += d.name + " - " + d.amount + "<br>";
      }
    });

    document.getElementById("output").innerHTML = text;
  });
}

loadData();
</script>

</body>
</html>
