<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<p id="message"></p>

<script>
const SUPABASE_URL = "https://varktzwttvxijmdcmjzn.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY_HERE";

async function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  // 🔐 LOGIN (Supabase Auth)
  const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.error) {
    document.getElementById("message").innerHTML = data.error.message;
    return;
  }

  // 💾 Save session
  localStorage.setItem("user", JSON.stringify(data.user));

  // 🔎 GET ROLE FROM DATABASE
  const roleRes = await fetch(
    SUPABASE_URL + "/rest/v1/users?email=eq." + email,
    {
      headers: {
        "apikey": SUPABASE_KEY
      }
    }
  );

  const roleData = await roleRes.json();

  if (roleData.length === 0) {
    document.getElementById("message").innerHTML = "No role found!";
    return;
  }

  const role = roleData[0].role;

  // 🚀 REDIRECT BASED SA ROLE
  if (role === "admin") {
    window.location.href = "admin.html";
  } else if (role === "cashier") {
    window.location.href = "cashier.html";
  } else if (role === "rider") {
    window.location.href = "rider.html";
  }
}
</script>

</body>
</html>
