<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<p id="status"></p>

<a href="index.html">Back to Home</a>

<script>
  // 🔥 FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyCfqkYXlDy-73t6SKxXb59L6OofEpG5B84",
    authDomain: "capstone-db-e181b.firebaseapp.com",
    projectId: "capstone-db-e181b",
    storageBucket: "capstone-db-e181b.firebasestorage.app",
    messagingSenderId: "104812686425",
    appId: "1:104812686425:web:88c3546b45c7237fc59548",
    measurementId: "G-H9FB26H7TS"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then((userCredential) => {
        const role = localStorage.getItem('role');
        if (role === 'admin') {
          window.location.href = "admin.html";
        } else {
          document.getElementById("status").innerText = "Access denied! Not an admin account.";
          auth.signOut();
        }
      })
      .catch(error => {
        document.getElementById("status").innerText = error.message;
      });
  }
</script>

</body>
</html>
