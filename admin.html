<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Users List</h2>

<button onclick="loadUsers()">Load Users</button>

<table border="1">
  <thead>
    <tr>
      <th>Email</th>
      <th>UID</th>
    </tr>
  </thead>
  <tbody id="users"></tbody>
</table>

<script>
function loadUsers() {
  fetch("https://capstone-db-e181b-default-rtdb.firebaseio.com/users.json")
    .then(res => res.json())
    .then(data => {
      const table = document.getElementById("users");
      table.innerHTML = "";

      for (let key in data) {
        table.innerHTML += `
          <tr>
            <td>${data[key].email}</td>
            <td>${data[key].uid}</td>
          </tr>
        `;
      }
    });
}
</script>

</body>
</html>
